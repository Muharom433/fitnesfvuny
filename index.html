<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sistem Manajemen Internal Fitness Center Vokasi UNY" />
    <title>FITNESS CENTER FV UNY — Sistem Manajemen</title>
    <!-- Global Error Interceptor for Visual Debugging -->
    <script>
      window.addEventListener('error', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100%';
        errDiv.style.backgroundColor = '#fee2e2';
        errDiv.style.color = '#991b1b';
        errDiv.style.borderBottom = '3px solid #ef4444';
        errDiv.style.padding = '16px';
        errDiv.style.zIndex = '999999';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '12px';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.style.boxShadow = '0 4px 6px -1px rgba(0,0,0,0.1)';
        errDiv.innerHTML = '<strong>[Aplikasi Error]:</strong> ' + event.message + '\nDi: ' + event.filename + ':' + event.lineno + ':' + event.colno + '\nStack:\n' + (event.error ? event.error.stack : 'N/A');
        
        var closeBtn = document.createElement('button');
        closeBtn.innerHTML = 'Tutup [X]';
        closeBtn.style.float = 'right';
        closeBtn.style.backgroundColor = '#991b1b';
        closeBtn.style.color = '#ffffff';
        closeBtn.style.border = 'none';
        closeBtn.style.padding = '4px 8px';
        closeBtn.style.borderRadius = '4px';
        closeBtn.style.cursor = 'pointer';
        closeBtn.onclick = function() { errDiv.remove(); };
        errDiv.insertBefore(closeBtn, errDiv.firstChild);

        document.body.appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100%';
        errDiv.style.backgroundColor = '#ffedd5';
        errDiv.style.color = '#9a3412';
        errDiv.style.borderBottom = '3px solid #f97316';
        errDiv.style.padding = '16px';
        errDiv.style.zIndex = '999999';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '12px';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.style.boxShadow = '0 4px 6px -1px rgba(0,0,0,0.1)';
        errDiv.innerHTML = '<strong>[Promise Rejection]:</strong> ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown reason') + '\nStack:\n' + (event.reason && event.reason.stack ? event.reason.stack : 'N/A');
        
        var closeBtn = document.createElement('button');
        closeBtn.innerHTML = 'Tutup [X]';
        closeBtn.style.float = 'right';
        closeBtn.style.backgroundColor = '#9a3412';
        closeBtn.style.color = '#ffffff';
        closeBtn.style.border = 'none';
        closeBtn.style.padding = '4px 8px';
        closeBtn.style.borderRadius = '4px';
        closeBtn.style.cursor = 'pointer';
        closeBtn.onclick = function() { errDiv.remove(); };
        errDiv.insertBefore(closeBtn, errDiv.firstChild);

        document.body.appendChild(errDiv);
      });
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
