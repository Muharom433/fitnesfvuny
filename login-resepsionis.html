<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN RESEPSIONIS - FITNESS CENTER FV UNY</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0a2540;
            --primary-brand: #0a2540;
            --primary-brand-light: #163b60;
            --primary-brand-dark: #031b33;
            --accent: #ff6b00;
            --accent-light: #ff8533;
            --accent-dark: #e05e00;
            --bg-dark: #f8f9fa;
            --border-color: #cbd5e1;
            --text-light: #334155;
            --text-dark: #1f2937;
            --text-gray: #475569;
            --success: #10b981;
            --danger: #ef4444;
            
            --font-heading: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-subheading: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-accent: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-body: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* -------------------------------------------------------------
           LOGIN SCREEN - SPLIT LAYOUT
           ------------------------------------------------------------- */
        .login-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        /* LEFT PANEL — Photo side */
        .login-photo-panel {
            position: relative;
            overflow: hidden;
            background-color: #051424;
        }

        .login-photo-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0.65;
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.3, 1), opacity 0.8s ease;
        }

        .login-photo-panel:hover img {
            opacity: 0.75;
            transform: scale(1.06);
        }

        .login-photo-overlay {
            position: absolute;
            bottom: 18%;
            left: 8%;
            right: 8%;
            padding: 40px;
            background: rgba(5, 20, 36, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.2), 
                        0 0 40px rgba(255, 107, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: cardEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow: hidden;
            z-index: 2;
            transition: border-color 0.4s ease, box-shadow 0.4s ease, transform 0.1s ease-out;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        /* Sweeping shine effect across the card */
        .login-photo-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
            transform: skewX(-25deg);
            animation: shine 6s infinite ease-in-out;
            pointer-events: none;
        }

        .login-badge {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 107, 0, 0.18);
            border: 1px solid rgba(255, 107, 0, 0.4);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 50px;
            font-family: var(--font-subheading);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.3, 1) 0.2s forwards;
            opacity: 0;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.2);
            transition: all 0.3s ease;
        }

        .login-badge:hover {
            background: rgba(255, 107, 0, 0.3);
            box-shadow: 0 0 25px rgba(255, 107, 0, 0.5);
            transform: scale(1.05);
        }

        .login-badge i {
            animation: rotateDumbbell 2s infinite ease-in-out;
            color: var(--accent-light);
        }

        .login-photo-accent-bar {
            width: 55px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 50%, var(--accent) 100%);
            background-size: 200% auto;
            border-radius: 4px;
            animation: expandBar 1.2s cubic-bezier(0.25, 1, 0.3, 1) 0.4s forwards, gradientMove 3s linear infinite;
            transform-origin: left;
            opacity: 0;
            box-shadow: 0 0 10px rgba(255,107,0,0.6);
        }

        .login-photo-title {
            font-family: var(--font-heading);
            font-size: 2.75rem;
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: 1px;
            color: #ffffff;
        }

        .login-photo-title > span {
            display: block;
        }

        /* Staggered letter-reveal span classes */
        .char-anim {
            display: inline-block;
            opacity: 0;
            transform: translateY(30px) scale(0.85);
            filter: blur(8px);
            animation: charReveal 0.9s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .title-fit .char-anim {
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        .title-uny .char-anim {
            background: linear-gradient(90deg, #ffffff 0%, #ff8533 50%, #ff6b00 100%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: charReveal 0.9s cubic-bezier(0.19, 1, 0.22, 1) forwards, gradientMove 4s ease infinite;
            text-shadow: 0 0 40px rgba(255, 107, 0, 0.25);
        }

        .login-photo-subtitle {
            font-family: var(--font-subheading);
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.3, 1) 0.9s forwards;
            opacity: 0;
            margin-top: 4px;
        }

        /* Dual pulsing dots */
        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        .dot-1 {
            animation: pulseDot 2s infinite;
        }

        .dot-2 {
            animation: pulseDot 2s infinite 0.5s;
            margin-right: 8px;
        }

        /* Glow Orbs behind glass card */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 1;
            animation: floatOrb 10s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, var(--accent) 0%, rgba(255,107,0,0) 70%);
            top: 20%;
            left: 10%;
            animation-duration: 8s;
        }

        .orb-2 {
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, #0a2540 0%, rgba(10,37,64,0) 70%);
            bottom: 15%;
            right: 5%;
            animation-duration: 12s;
            opacity: 0.45;
        }

        /* Animations */
        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes expandBar {
            from {
                opacity: 0;
                transform: scaleX(0);
            }
            to {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        @keyframes pulseDot {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 107, 0, 0.7);
            }
            70% {
                transform: scale(1.3);
                box-shadow: 0 0 0 8px rgba(255, 107, 0, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 107, 0, 0);
            }
        }

        @keyframes shine {
            0% {
                left: -150%;
            }
            50% {
                left: 150%;
            }
            100% {
                left: 150%;
            }
        }

        @keyframes rotateDumbbell {
            0%, 100% {
                transform: rotate(0deg) scale(1);
            }
            25% {
                transform: rotate(-15deg) scale(1.1);
            }
            75% {
                transform: rotate(15deg) scale(1.1);
            }
        }

        @keyframes charReveal {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.85);
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes floatOrb {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
            }
            100% {
                transform: translateY(-40px) scale(1.15) rotate(90deg);
            }
        }

        /* RIGHT PANEL — Form side */
        .login-form-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: stretch;
            padding: 60px 56px;
            background-color: #ffffff;
            overflow-y: auto;
        }

        /* Responsive: stack on mobile */
        @media (max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
            }
            .login-photo-panel {
                display: none;
            }
            .login-form-panel {
                padding: 40px 28px;
            }
        }

        .login-card {
            background-color: transparent;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            text-align: left;
        }

        .login-logo {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            margin-bottom: 30px;
        }

        .login-logo .logo-bold {
            font-family: var(--font-heading);
            font-size: 1.65rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .login-logo .logo-accent {
            font-family: var(--font-subheading);
            font-size: 1.15rem;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .login-title {
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 1.45rem;
            margin-bottom: 24px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .form-group label {
            display: block;
            font-family: var(--font-subheading);
            font-size: 0.82rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: var(--font-accent);
            font-weight: 600;
            color: var(--text-dark);
            transition: 0.2s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.2);
            background-color: #ffffff;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent);
            color: #ffffff;
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            padding: 13px 26px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.3s ease, box-shadow 0.3s ease;
            gap: 10px;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--accent-dark);
            transform: translateY(-4px) scale(1.025);
            box-shadow: 0 10px 24px rgba(255, 107, 0, 0.3);
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
            text-align: left;
        }

        /* Toast Notifications */
        #toastNotify {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--primary);
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            z-index: 2500;
            display: none;
            font-weight: 700;
            font-size: 0.9rem;
            border-bottom: 3px solid var(--accent);
        }

        /* Back Link hover effect */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray) !important;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            padding-bottom: 4px;
        }
        
        .back-link i {
            transition: transform 0.3s ease;
        }
        
        .back-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--accent) !important;
            letter-spacing: 1.5px;
        }
        
        .back-link:hover i {
            transform: translateX(-5px);
        }
        
        .back-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
    </style>
</head>

<body>

    <!-- TOAST NOTIFICATION -->
    <div id="toastNotify"></div>

    <div class="login-container" id="loginContainer">
        <!-- LEFT: Photo Panel -->
        <div class="login-photo-panel">
            <img src="assets/recepsionis_putih.jpg" alt="Fitness Center Vokasi UNY">
            
            <!-- Glow Orbs -->
            <div class="glow-orb orb-1"></div>
            <div class="glow-orb orb-2"></div>

            <div class="login-photo-overlay">
                <div class="login-badge">
                    <i class="fa-solid fa-dumbbell"></i>
                    <span>RESMI</span>
                </div>
                <div class="login-photo-accent-bar"></div>
                <h1 class="login-photo-title">
                    <span class="title-fit">FITNESS CENTER</span>
                    <span class="title-uny">VOKASI UNY</span>
                </h1>
                <p class="login-photo-subtitle">
                    <span class="pulse-dot dot-1"></span>
                    <span class="pulse-dot dot-2"></span>
                    SISTEM MANAJEMEN INTERNAL
                </p>
            </div>
        </div>

        <!-- RIGHT: Form Panel -->
        <div class="login-form-panel">
            <div class="login-card">
                <!-- LOGO HEADER -->
                <div class="login-logo">
                    <img src="assets/logo.png" alt="Logo Fitness Center FV UNY" style="height: 50px; border-radius: 4px;">
                    <div style="display: flex; flex-direction: column; text-align: left;">
                        <span class="logo-bold">FITNESS CENTER</span>
                        <span class="logo-accent">FV UNY RECEPTIONIST</span>
                    </div>
                </div>

                <!-- LOGIN FORM -->
                <div>
                    <h2 class="login-title" style="font-size: 1.75rem; margin-bottom: 8px;">SELAMAT DATANG RESEPSIONIS</h2>
                    <p style="color: var(--accent); font-size: 0.95rem; font-weight: 600; margin-bottom: 28px;">MASUK KE SISTEM MANAJEMEN RESEPSIONIS</p>
                    
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="loginEmail">ALAMAT EMAIL / USERNAME</label>
                            <input type="email" id="loginEmail" required placeholder="CONTOH: resepsionis@uny.ac.id">
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">KATA SANDI</label>
                            <input type="password" id="loginPassword" required placeholder="MASUKKAN KATA SANDI ANDA...">
                        </div>
                        
                        <button type="submit" class="btn">MASUK <i class="fa-solid fa-right-to-bracket"></i></button>
                        <p class="error-msg" id="loginError" style="display: none;"></p>
                    </form>

                    <div style="margin-top: 25px; border-top: 1px solid var(--border-color); padding-top: 15px; text-align: center;">
                        <a href="index.html" class="back-link">
                            <i class="fa-solid fa-arrow-left"></i> KEMBALI KE PORTAL UTAMA
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        document.addEventListener("DOMContentLoaded", () => {
            // Clear current active session on entering login screen
            sessionStorage.removeItem("fit_uny_staff_authorized");
            localStorage.removeItem("fit_uny_admin_logged");
            localStorage.removeItem("fit_uny_receptionist_logged");

            // Initialize default receptionist accounts if none exists
            if (!localStorage.getItem("fit_uny_receptionist_accounts")) {
                const defaultReceptionists = [{
                    email: "resepsionis@uny.ac.id",
                    password: "resepsionis123",
                    name: "Resepsionis Vokasi"
                }];
                localStorage.setItem("fit_uny_receptionist_accounts", JSON.stringify(defaultReceptionists));
            }

            // --- AESTHETIC EFFECTS ---
            // 1. Text splitter for letter reveal animation
            function splitTextIntoSpans(selector) {
                const element = document.querySelector(selector);
                if (!element) return;
                const text = element.textContent.trim();
                element.textContent = '';
                
                const words = text.split(' ');
                words.forEach((word, wordIndex) => {
                    const wordSpan = document.createElement('span');
                    wordSpan.style.display = 'inline-block';
                    wordSpan.style.whiteSpace = 'nowrap';
                    
                    [...word].forEach((char, charIndex) => {
                        const charSpan = document.createElement('span');
                        charSpan.textContent = char;
                        charSpan.className = 'char-anim';
                        
                        // Calculate total index for staggered animation delays
                        let prevCharsCount = 0;
                        for (let i = 0; i < wordIndex; i++) {
                            prevCharsCount += words[i].length;
                        }
                        const totalCharIndex = prevCharsCount + charIndex;
                        charSpan.style.animationDelay = `${0.3 + totalCharIndex * 0.04}s`;
                        
                        wordSpan.appendChild(charSpan);
                    });
                    
                    element.appendChild(wordSpan);
                    
                    if (wordIndex < words.length - 1) {
                        const space = document.createTextNode(' ');
                        element.appendChild(space);
                    }
                });
            }

            splitTextIntoSpans('.title-fit');
            splitTextIntoSpans('.title-uny');

            // 2. Mouse-tracking 3D Tilt Effect
            const panel = document.querySelector('.login-photo-panel');
            const card = document.querySelector('.login-photo-overlay');
            
            if (panel && card) {
                panel.addEventListener('mousemove', (e) => {
                    const rect = panel.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const cardRect = card.getBoundingClientRect();
                    const cardCenterX = cardRect.left - rect.left + cardRect.width / 2;
                    const cardCenterY = cardRect.top - rect.top + cardRect.height / 2;
                    
                    const deltaX = x - cardCenterX;
                    const deltaY = y - cardCenterY;
                    
                    // Rotate maximum 8 degrees
                    const rotX = -(deltaY / (rect.height / 2)) * 8;
                    const rotY = (deltaX / (rect.width / 2)) * 8;
                    
                    card.style.transform = `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg) translateY(-5px)`;
                });
                
                panel.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(0)`;
                });
            }
        });

        function showToast(message) {
            const toast = document.getElementById("toastNotify");
            toast.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${message}`;
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 3000);
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById("loginEmail").value.trim().toLowerCase();
            const pass = document.getElementById("loginPassword").value;
            const errorMsg = document.getElementById("loginError");
            errorMsg.style.display = "none";

            // Check if Supabase URL is customized/configured
            const isSupabaseConfigured = import.meta.env.VITE_SUPABASE_URL && 
                                        import.meta.env.VITE_SUPABASE_URL !== 'https://your-project-id.supabase.co';

            if (isSupabaseConfigured) {
                try {
                    showToast("MENGHUBUNGI SERVER DATABASE...");
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: pass
                    });

                    if (error) {
                        throw error;
                    }

                    // Get user profile to verify they are a staff member
                    const { data: profile, error: profileError } = await supabase
                        .from('profiles')
                        .select('is_admin')
                        .eq('id', data.user.id)
                        .single();

                    if (profileError) throw profileError;

                    // Any authenticated user that is not restricted can login as receptionist
                    sessionStorage.setItem("fit_uny_staff_authorized", "true");
                    localStorage.setItem("fit_uny_receptionist_logged", "true");
                    showToast("LOGIN RESEPSIONIS BERHASIL! MENGALIHKAN...");
                    setTimeout(() => {
                        window.location.href = "resepsionis.html";
                    }, 1000);
                    return;
                } catch (err) {
                    console.warn("Supabase Auth failed, checking local database fallback...", err.message);
                }
            }

            // Check Receptionist accounts in localStorage
            let receptionistAccounts = JSON.parse(localStorage.getItem("fit_uny_receptionist_accounts")) || [];
            const recepMatch = receptionistAccounts.find(acc => acc.email === email && acc.password === pass);

            if (recepMatch) {
                sessionStorage.setItem("fit_uny_staff_authorized", "true");
                localStorage.setItem("fit_uny_receptionist_logged", "true");
                showToast("LOGIN RESEPSIONIS BERHASIL! MENGALIHKAN...");
                setTimeout(() => {
                    window.location.href = "resepsionis.html";
                }, 1000);
                return;
            }

            errorMsg.innerText = "EMAIL, USERNAME, ATAU KATA SANDI RESEPSIONIS SALAH!";
            errorMsg.style.display = "block";
        }

        // Expose handleLogin to global scope for the inline HTML form handler
        window.handleLogin = handleLogin;
    </script>
</body>

</html>
